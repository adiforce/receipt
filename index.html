<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>發票解析工具 (Excel進化版)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; margin: 0; background: #1e1e1e; color: #f0f0f0; }
        h2 { text-align: center; margin-top: 0; }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        input[type="password"] { background: #333; color: #fff; border: 1px solid #555; }
        input[type="file"] { background: #333; color: #fff; padding: 12px; border: 1px dashed #777; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; color: #999; }
        
        #preview { max-width: 100%; border-radius: 8px; margin-top: 10px; display: none; }
        
        /* 表格與複製按鈕樣式 */
        #resultContainer { margin-top: 20px; display: none; }
        table { width: 100%; border-collapse: collapse; background: #2d2d2d; font-size: 15px; }
        th, td { border: 1px solid #555; padding: 10px; text-align: left; }
        th { background: #444; color: #66b3ff; }
        td:nth-child(3) { text-align: right; } /* 金額靠右對齊 */
        
        #copyBtn { background: #28a745; margin-top: 15px; }
        
        .checkbox-group { display: flex; align-items: center; font-size: 14px; color: #ccc; margin-bottom: 15px; }
        .checkbox-group input { width: auto; margin-right: 10px; transform: scale(1.3); }
        #statusText { color: #aaa; font-size: 14px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>發票解析工具</h2>
    
    <input type="password" id="apiKey" placeholder="貼上 Gemini API Key">
    <div class="checkbox-group">
        <input type="checkbox" id="saveKey"> <label for="saveKey">記住金鑰</label>
    </div>

    <input type="file" id="imageInput" accept="image/*" capture="environment">
    <img id="preview" alt="發票預覽">

    <button id="submitBtn">送出解析</button>
    <div id="statusText"></div>

    <div id="resultContainer">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>項目</th>
                    <th>日幣</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
        <button id="copyBtn">📋 全部複製 (貼上 Excel 自動分欄)</button>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const saveKeyCheck = document.getElementById('saveKey');
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const submitBtn = document.getElementById('submitBtn');
        const statusText = document.getElementById('statusText');
        const resultContainer = document.getElementById('resultContainer');
        const tableBody = document.getElementById('tableBody');
        const copyBtn = document.getElementById('copyBtn');
        
        let base64Image = "";
        let tsvData = ""; // 存要複製到剪貼簿的資料

        if (localStorage.getItem('saved_gemini_key')) {
            apiKeyInput.value = localStorage.getItem('saved_gemini_key');
            saveKeyCheck.checked = true;
        }

        saveKeyCheck.addEventListener('change', () => {
            if (!saveKeyCheck.checked) localStorage.removeItem('saved_gemini_key');
        });

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                preview.src = event.target.result;
                preview.style.display = 'block';
                base64Image = event.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        });

        submitBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) return alert("API Key 沒填。");
            if (!base64Image) return alert("照片沒傳。");

            if (saveKeyCheck.checked) localStorage.setItem('saved_gemini_key', apiKey);

            submitBtn.disabled = true;
            resultContainer.style.display = 'none';
            statusText.innerText = "玩命解析中，請稍候...";

            // 逼迫 AI 吐出嚴格格式的 Prompt
            const prompt = `請解析這張發票。
            請嚴格輸出純 JSON 陣列格式，不要加上 \`\`\`json 標籤，也不要說任何其他廢話。
            規則如下：
            1. 每一筆品項轉成一個 JSON 物件：{"date": "MM/DD", "item": "店名 - 中文品項名", "price": 數字}。
            2. 最後一筆必須是加總物件：{"date": "", "item": "店名 (總計)", "price": 總金額數字}。
            例如：
            [
              {"date": "08/13", "item": "駿河屋 - 生日兔子玩偶", "price": 600},
              {"date": "", "item": "駿河屋 (總計)", "price": 3000}
            ]`;
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                            ]
                        }]
                    })
                });

                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                
                // 清理 AI 回應，確保是純 JSON
                let rawText = data.candidates[0].content.parts[0].text;
                rawText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
                
                const parsedData = JSON.parse(rawText);
                
                // 產生表格 HTML 與 TSV 字串
                let html = '';
                tsvData = '日期\t項目\t日幣\n'; // TSV 標題列

                parsedData.forEach(row => {
                    html += `<tr><td>${row.date}</td><td>${row.item}</td><td>${row.price}</td></tr>`;
                    tsvData += `${row.date}\t${row.item}\t${row.price}\n`;
                });

                tableBody.innerHTML = html;
                resultContainer.style.display = 'block';
                statusText.innerText = "解析完成！";

            } catch (err) {
                statusText.innerText = "出錯了，可能是 AI 沒按格式回傳：\n" + err.message;
            } finally {
                submitBtn.disabled = false;
            }
        });

        // 複製按鈕功能
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(tsvData).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "✅ 複製成功！快去貼上";
                copyBtn.style.background = "#1e7e34";
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.style.background = "#28a745";
                }, 2000);
            }).catch(err => {
                alert("複製失敗，你的瀏覽器可能不支援剪貼簿功能。");
            });
        });
    </script>
</body>
</html>
