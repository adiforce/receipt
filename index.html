<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>發票解析工具 (本機儲存版)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; margin: 0; background: #1e1e1e; color: #f0f0f0; padding-bottom: 50px; }
        h2 { text-align: center; margin-top: 0; }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        input[type="password"] { background: #333; color: #fff; border: 1px solid #555; }
        input[type="file"] { background: #333; color: #fff; padding: 12px; border: 1px dashed #777; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:disabled { background: #555; color: #999; }
        
        #preview { max-width: 100%; max-height: 150px; border-radius: 8px; margin-top: 10px; display: none; object-fit: contain; background: #000; }
        
        .checkbox-group { display: flex; align-items: center; font-size: 14px; color: #ccc; margin-bottom: 15px; }
        .checkbox-group input { width: auto; margin-right: 10px; transform: scale(1.3); }
        #statusText { color: #aaa; font-size: 14px; text-align: center; margin-top: 10px; margin-bottom: 20px; white-space: pre-wrap; min-height: 20px;}
        
        .divider { border-top: 1px solid #444; margin: 20px 0; padding-top: 10px; color: #888; text-align: center; font-size: 14px; letter-spacing: 2px;}

        .invoice-card { background: #252525; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card-time { font-size: 12px; color: #888; }
        .btn-delete { width: auto; padding: 6px 12px; margin: 0; background: #dc3545; font-size: 12px; border-radius: 6px; }
        
        .table-responsive { width: 100%; overflow-x: auto; margin-bottom: 15px; border-radius: 6px; border: 1px solid #444; }
        table { width: 100%; border-collapse: collapse; background: #2d2d2d; font-size: 14px; min-width: 500px; }
        th, td { border: 1px solid #555; padding: 8px; text-align: left; }
        th { background: #444; color: #66b3ff; white-space: nowrap; }
        td:nth-child(4) { text-align: right; color: #ffdd66; font-weight: bold; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-btns button { margin: 0; padding: 12px; font-size: 14px; }
        .btn-copy { background: #28a745; }
        .btn-share { background: #17a2b8; grid-column: span 2; }

        body {
            /* 其他現有的樣式 ... */
            background-image: url('https://i.postimg.cc/ZYwHkJ3c/2026-03-17-15-34-45.png'); /* 加入這一行 */
            background-size: cover; /* 讓圖片鋪滿整個畫面 */
            background-attachment: fixed; /* 讓背景圖片固定，不會隨頁面捲動 */
        }

    </style>
</head>
<body>
    <h2>發票解析工具</h2>
    
    <input type="password" id="apiKey" placeholder="貼上 Gemini API Key">
    <div class="checkbox-group">
        <input type="checkbox" id="saveKey"> <label for="saveKey">記住金鑰</label>
    </div>

    <input type="file" id="imageInput" accept="image/*">
    <img id="preview" alt="發票預覽">

    <button id="submitBtn">送出解析</button>
    <div id="statusText"></div>

    <div class="divider">👇 解析紀錄 (存在本機) 👇</div>
    
    <div id="historyContainer"></div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const saveKeyCheck = document.getElementById('saveKey');
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const submitBtn = document.getElementById('submitBtn');
        const statusText = document.getElementById('statusText');
        const historyContainer = document.getElementById('historyContainer');
        
        let base64Image = "";
        
        let invoiceHistory = JSON.parse(localStorage.getItem('invoice_history')) || [];
        window.tempActionData = {};

        if (localStorage.getItem('saved_gemini_key')) {
            apiKeyInput.value = localStorage.getItem('saved_gemini_key');
            saveKeyCheck.checked = true;
        }

        saveKeyCheck.addEventListener('change', () => {
            if (!saveKeyCheck.checked) localStorage.removeItem('saved_gemini_key');
        });

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                preview.src = event.target.result;
                preview.style.display = 'block';
                base64Image = event.target.result.split(',')[1];
                statusText.innerText = "照片已載入，可按送出。";
            };
            reader.readAsDataURL(file);
        });

        function renderHistory() {
            historyContainer.innerHTML = '';
            window.tempActionData = {};

            if (invoiceHistory.length === 0) {
                historyContainer.innerHTML = '<p style="text-align:center; color:#777;">目前沒有任何紀錄。</p>';
                return;
            }

            invoiceHistory.forEach((record, index) => {
                let detailsTsv = "";
                let totalTsv = "";
                let shareText = "發票解析明細：\n\n";
                let trs = "";

                record.data.forEach((row, rIndex) => {
                    trs += `<tr><td>${row.date}</td><td>${row.item}</td><td>${row.translation}</td><td>${row.price}</td></tr>`;
                    
                    if (rIndex === record.data.length - 1) {
                        totalTsv = `${row.date}\t${row.item}\t${row.price}`;
                    } else {
                        if (detailsTsv !== "") detailsTsv += "\n";
                        detailsTsv += `${row.date}\t${row.item}\t${row.price}`;
                    }
                });

                shareText += record.data.map(r => {
                    if (r.translation) return `${r.date || '    '} | ${r.item} | ${r.translation} | ¥${r.price}`;
                    return `${r.date || '    '} | ${r.item} | ¥${r.price}`;
                }).join('\n\n');

                window.tempActionData[index] = { detailsTsv, totalTsv, shareText };

                const card = document.createElement('div');
                card.className = 'invoice-card';
                const timeStr = new Date(record.timestamp).toLocaleString('zh-TW', {hour12: false});

                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-time">掃描時間：${timeStr}</span>
                        <button class="btn-delete" onclick="deleteRecord(${index})">刪除</button>
                    </div>
                    <div class="table-responsive">
                        <table>
                            <thead><tr><th>日期</th><th>項目(原文)</th><th>中文翻譯</th><th>日幣</th></tr></thead>
                            <tbody>${trs}</tbody>
                        </table>
                    </div>
                    <div class="action-btns">
                        <button class="btn-copy" onclick="handleCopyBtn(this, ${index}, 'details')">📋 複製明細</button>
                        <button class="btn-copy" onclick="handleCopyBtn(this, ${index}, 'total')">📋 複製加總</button>
                        <button class="btn-share" onclick="handleShareBtn(this, ${index})">📤 系統分享 / 複製全部</button>
                    </div>
                `;
                historyContainer.appendChild(card);
            });
        }

        renderHistory();

        submitBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) return alert("API Key 沒填。");
            if (!base64Image) return alert("照片沒傳。");

            if (saveKeyCheck.checked) localStorage.setItem('saved_gemini_key', apiKey);

            submitBtn.disabled = true;
            statusText.innerText = "玩命解析中，請稍候...";

            const prompt = `請解析這張發票。
            請嚴格輸出純 JSON 陣列格式，不要加上 \`\`\`json 標籤，也不要說任何廢話。
            請將日文商品名稱精準翻譯成通順的「台灣繁體中文」，絕對不要有生硬的機翻感。
            規則如下：
            1. 每一筆品項轉成一個 JSON 物件：{"date": "MM/DD", "item": "店名 - 日文原文", "translation": "高質量的繁體中文翻譯", "price": 數字}。
            2. 最後一筆必須是加總物件：{"date": "", "item": "店名 (總計)", "translation": "", "price": 總金額數字}。`;
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                            ]
                        }]
                    })
                });

                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                
                let rawText = data.candidates[0].content.parts[0].text;
                rawText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
                const parsedData = JSON.parse(rawText);
                
                if (parsedData.length > 1) {
                    const itemsData = parsedData.slice(0, -1);
                    const firstItem = itemsData[0];
                    const storeName = firstItem.item.includes(' - ') ? firstItem.item.split(' - ')[0].trim() : "未知名稱";
                    
                    const summaryNames = itemsData.slice(0, 3).map(r => {
                        const pureItemName = r.item.includes(' - ') ? r.item.split(' - ')[1].trim() : r.item.trim();
                        return pureItemName.substring(0, 3);
                    });
                    
                    const summarySuffix = itemsData.length > 3 ? "..." : "";
                    const totalRow = parsedData[parsedData.length - 1];
                    totalRow.date = firstItem.date;
                    totalRow.item = `加總：${storeName}(${summaryNames.join(',')}${summarySuffix})`;
                }

                invoiceHistory.unshift({
                    timestamp: Date.now(),
                    data: parsedData
                });
                localStorage.setItem('invoice_history', JSON.stringify(invoiceHistory));

                renderHistory();
                
                imageInput.value = '';
                preview.style.display = 'none';
                base64Image = '';
                statusText.innerText = "✅ 解析完成並已儲存！可直接挑選下一張。";

            } catch (err) {
                statusText.innerText = "出錯了：\n" + err.message;
            } finally {
                submitBtn.disabled = false;
            }
        });

        window.deleteRecord = function(index) {
            if (confirm("確定要刪除這筆紀錄嗎？")) {
                invoiceHistory.splice(index, 1);
                localStorage.setItem('invoice_history', JSON.stringify(invoiceHistory));
                renderHistory();
            }
        };

        window.handleCopyBtn = function(btnElement, index, type) {
            const dataToCopy = type === 'details' ? window.tempActionData[index].detailsTsv : window.tempActionData[index].totalTsv;
            if (!dataToCopy) return alert("沒資料。");
            
            navigator.clipboard.writeText(dataToCopy).then(() => {
                const originalText = btnElement.innerText;
                const originalBg = btnElement.style.background;
                btnElement.innerText = "✅ 已複製";
                btnElement.style.background = "#1e7e34";
                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.style.background = originalBg;
                }, 2000);
            }).catch(() => alert("複製失敗。"));
        };

        window.handleShareBtn = async function(btnElement, index) {
            const shareText = window.tempActionData[index].shareText;
            if (!shareText) return alert("沒資料。");
            
            const shareData = { title: '發票解析結果', text: shareText };
            
            if (navigator.share && navigator.canShare(shareData)) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    console.log('分享取消');
                }
            } else {
                navigator.clipboard.writeText(shareText).then(() => {
                    const originalText = btnElement.innerText;
                    btnElement.innerText = "✅ 已複製完整文字";
                    setTimeout(() => btnElement.innerText = originalText, 2000);
                });
            }
        };
    </script>
</body>
</html>
