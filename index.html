<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="發票解析">
  <title>🧾 發票解析</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d0d0d, #0d1a2e 50%, #0d1a0d);
      font-family: Georgia, serif;
      color: #e8e0d0;
    }
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 3rem;
    }
    .header { text-align: center; margin-bottom: 1.2rem; }
    .header h1 { font-size: 1.6rem; color: #f0d080; text-shadow: 0 0 20px rgba(240,208,128,0.4); }
    .header p { font-size: 0.73rem; color: #7070a0; margin-top: 0.25rem; }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 1.25rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 1rem;
    }

    /* API Key 輸入 */
    .api-label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: #8080a0;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .api-row { display: flex; gap: 0.5rem; align-items: center; }
    .api-input {
      flex: 1;
      padding: 0.55rem 0.75rem;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #e8e0d0;
      font-size: 0.85rem;
      font-family: monospace;
      outline: none;
    }
    .api-input::placeholder { color: #505060; }
    .api-save {
      padding: 0.55rem 0.9rem;
      background: rgba(240,208,128,0.15);
      border: 1px solid rgba(240,208,128,0.3);
      border-radius: 8px;
      color: #f0d080;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .api-note { font-size: 0.68rem; color: #505070; margin-top: 0.4rem; }

    /* 上傳區 */
    #dropzone {
      border: 2px dashed rgba(255,255,255,0.18);
      border-radius: 12px;
      padding: 1.8rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    #dropzone.drag { border-color: #f0d080; background: rgba(240,208,128,0.04); }
    #dropzone .icon { font-size: 2.2rem; }
    #dropzone p { color: #9090b0; font-size: 0.85rem; margin-top: 0.4rem; }
    #preview-wrap { display: none; }
    #preview-img { width: 100%; border-radius: 8px; max-height: 200px; object-fit: contain; margin-bottom: 0.9rem; }

    /* 按鈕 */
    .btn {
      width: 100%;
      padding: 0.65rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 0.45rem;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-gold { background: linear-gradient(135deg,#f0d080,#c8900a); color: #180a00; }
    .btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,0.18); color: #9090b0; }
    .btn-group { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .btn-group .btn { flex: 1; font-size: 0.8rem; padding: 0.6rem 0.3rem; margin-top: 0; }
    .btn-green { background: linear-gradient(135deg,#50c878,#2a8a50); color: #fff; }
    .btn-teal  { background: linear-gradient(135deg,#40c0c0,#1a8080); color: #fff; }
    .btn-blue  { background: linear-gradient(135deg,#5090e0,#2050a0); color: #fff; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.25); border-top-color: #f0d080;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-right: 0.4rem; vertical-align: middle;
    }

    /* 結果表格 */
    #result-card { display: none; }
    .table-head, .table-row, .table-total {
      display: grid;
      grid-template-columns: 52px 1fr 72px;
      padding: 0.4rem 0.6rem;
    }
    .table-head {
      background: rgba(240,208,128,0.1);
      border-radius: 6px 6px 0 0;
      font-size: 0.7rem; color: #c0a040; letter-spacing: 0.08em;
    }
    .table-row {
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 0.84rem; align-items: center;
    }
    .table-row .date-col { color: #9090b0; }
    .table-row .price-col { text-align: right; color: #d0c070; }
    .table-total {
      background: rgba(240,208,128,0.08);
      border-radius: 0 0 6px 6px;
      font-size: 0.88rem; font-weight: 700; color: #f0d080;
    }
    .table-total .price-col { text-align: right; }
    .excel-note { font-size: 0.68rem; color: #505070; margin-top: 0.5rem; text-align: center; }

    /* 錯誤 */
    #error-card {
      display: none;
      background: rgba(255,40,40,0.07);
      border: 1px solid rgba(255,80,80,0.3);
      border-radius: 16px;
      padding: 1.25rem;
      width: 100%; max-width: 480px;
      margin-bottom: 1rem;
    }
    #error-card h3 { color: #ff7070; margin-bottom: 0.4rem; }
    #error-msg { color: #ffb0b0; font-size: 0.78rem; white-space: pre-wrap; word-break: break-all; line-height: 1.7; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>🧾 發票解析</h1>
    <p>拍照上傳 → 解析 → 複製 / 分享</p>
  </div>

  <!-- API Key -->
  <div class="card">
    <label class="api-label">Anthropic API Key</label>
    <div class="api-row">
      <input class="api-input" id="api-key" type="password" placeholder="sk-ant-..." />
      <button class="api-save" onclick="saveKey()">儲存</button>
    </div>
    <p class="api-note">Key 只存在瀏覽器本機，不會上傳任何地方。取得：<a href="https://console.anthropic.com" target="_blank" style="color:#a0a0e0">console.anthropic.com</a></p>
  </div>

  <!-- 上傳 -->
  <div class="card">
    <div id="dropzone" onclick="document.getElementById('file-input').click()"
         ondragover="event.preventDefault();this.classList.add('drag')"
         ondragleave="this.classList.remove('drag')"
         ondrop="handleDrop(event)">
      <div class="icon">📸</div>
      <p>點擊上傳或拖曳發票照片</p>
    </div>
    <div id="preview-wrap">
      <img id="preview-img" alt="receipt" />
      <button class="btn btn-gold" id="analyze-btn" onclick="analyze()">🔍 開始解析</button>
      <button class="btn btn-ghost" onclick="reset()" style="margin-top:0.4rem">重新上傳</button>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
  </div>

  <!-- 結果 -->
  <div class="card" id="result-card">
    <div class="table-head">
      <span>日期</span><span>項目</span><span style="text-align:right">日幣</span>
    </div>
    <div id="table-body"></div>
    <div class="btn-group">
      <button class="btn btn-green" id="btn-detail" onclick="copyDetail()">📋 複製明細</button>
      <button class="btn btn-teal"  id="btn-total"  onclick="copyTotal()">📋 複製加總</button>
      <button class="btn btn-blue"  onclick="shareResult()">📤 分享</button>
    </div>
    <p class="excel-note">明細／加總為 Tab 分隔，可直接貼入 Excel</p>
  </div>

  <!-- 錯誤 -->
  <div id="error-card">
    <h3>⚠️ 錯誤</h3>
    <div id="error-msg"></div>
  </div>
</div>

<script>
  let currentFile = null;
  let parsedData = null;

  // Load saved key
  window.onload = () => {
    const saved = localStorage.getItem('anthropic_key');
    if (saved) document.getElementById('api-key').value = saved;
  };

  function saveKey() {
    const k = document.getElementById('api-key').value.trim();
    if (k) { localStorage.setItem('anthropic_key', k); alert('已儲存！'); }
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('dropzone').classList.remove('drag');
    handleFile(e.dataTransfer.files[0]);
  }

  function handleFile(file) {
    if (!file) return;
    currentFile = file;
    parsedData = null;
    hideError(); hideResult();
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('preview-img').src = e.target.result;
      document.getElementById('dropzone').style.display = 'none';
      document.getElementById('preview-wrap').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  function reset() {
    currentFile = null; parsedData = null;
    document.getElementById('dropzone').style.display = 'block';
    document.getElementById('preview-wrap').style.display = 'none';
    hideResult(); hideError();
  }

  function hideResult() { document.getElementById('result-card').style.display = 'none'; }
  function hideError()  { document.getElementById('error-card').style.display = 'none'; }
  function showError(msg) {
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('error-card').style.display = 'block';
  }

  function extractJson(text) {
    if (!text) throw new Error('回傳內容為空');
    try { return JSON.parse(text.trim()); } catch {}
    const stripped = text.replace(/^```[\w]*\n?/gm, '').replace(/```\s*$/gm, '').trim();
    try { return JSON.parse(stripped); } catch {}
    const m = text.match(/\{[\s\S]*\}/);
    if (m) { try { return JSON.parse(m[0]); } catch {} }
    throw new Error('無法解析 AI 回應。\n\n原始內容：\n' + text.slice(0, 600));
  }

  async function analyze() {
    const apiKey = document.getElementById('api-key').value.trim();
    if (!apiKey) { alert('請先填入 Anthropic API Key'); return; }
    if (!currentFile) return;

    const btn = document.getElementById('analyze-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>解析中...';
    hideError(); hideResult();

    try {
      const base64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(currentFile);
      });
      const mediaType = currentFile.type || 'image/jpeg';

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5',
          max_tokens: 1000,
          system: 'You are a receipt OCR assistant. Respond with valid JSON only. No markdown, no explanation.',
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
              { type: 'text', text: 'Analyze this Japanese receipt. Return ONLY this JSON (no markdown):\n{"storeName":"店名(日文)","date":"MM/DD","items":[{"nameZh":"品項繁中","priceJpy":0}],"totalJpy":0}' }
            ]
          }]
        })
      });

      const respText = await response.text();
      if (!response.ok) throw new Error('HTTP ' + response.status + '：' + respText.slice(0, 300));
      const data = JSON.parse(respText);
      if (data.error) throw new Error('API 錯誤：' + data.error.message);

      let raw = '';
      if (Array.isArray(data.content)) raw = (data.content.find(b => b.type === 'text') || {}).text || '';
      if (!raw) throw new Error('沒有回傳文字。回應：\n' + JSON.stringify(data).slice(0, 300));

      parsedData = extractJson(raw);
      renderResult(parsedData);
    } catch(e) {
      showError(e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '🔍 開始解析';
    }
  }

  function renderResult(p) {
    const body = document.getElementById('table-body');
    body.innerHTML = '';
    (p.items || []).forEach(item => {
      const row = document.createElement('div');
      row.className = 'table-row';
      row.innerHTML = `<span class="date-col">${p.date}</span><span>${p.storeName} ${item.nameZh}</span><span class="price-col">¥${item.priceJpy.toLocaleString()}</span>`;
      body.appendChild(row);
    });
    const total = document.createElement('div');
    total.className = 'table-total';
    total.innerHTML = `<span>${p.date}</span><span>${p.storeName}</span><span class="price-col">¥${p.totalJpy.toLocaleString()}</span>`;
    body.appendChild(total);
    document.getElementById('result-card').style.display = 'block';
  }

  function getDetailText() {
    if (!parsedData) return '';
    return (parsedData.items || []).map(item =>
      `${parsedData.date}\t${parsedData.storeName} ${item.nameZh}\t${item.priceJpy}`
    ).join('\n');
  }
  function getTotalText() {
    if (!parsedData) return '';
    return `${parsedData.date}\t${parsedData.storeName}\t${parsedData.totalJpy}`;
  }

  function copyText(text, btnId, label) {
    navigator.clipboard.writeText(text).catch(() => {
      const el = document.createElement('textarea');
      el.value = text; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el);
    });
    const btn = document.getElementById(btnId);
    btn.textContent = '✅ 已複製';
    setTimeout(() => btn.textContent = label, 2000);
  }
  function copyDetail() { copyText(getDetailText(), 'btn-detail', '📋 複製明細'); }
  function copyTotal()  { copyText(getTotalText(),  'btn-total',  '📋 複製加總'); }

  function shareResult() {
    if (!parsedData) return;
    const p = parsedData;
    const text = [
      '🧾 ' + p.storeName + '  ' + p.date, '',
      ...(p.items || []).map(i => i.nameZh + '\t¥' + i.priceJpy.toLocaleString()),
      '', '合計\t¥' + p.totalJpy.toLocaleString()
    ].join('\n');
    if (navigator.share) {
      navigator.share({ text }).catch(e => { if (e.name !== 'AbortError') alert('分享失敗：' + e.message); });
    } else {
      navigator.clipboard.writeText(text);
      alert('已複製到剪貼簿（此裝置不支援直接分享）');
    }
  }
</script>
</body>
</html>
