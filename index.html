<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>發票解析工具 (究極對帳版)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; margin: 0; background: #1e1e1e; color: #f0f0f0; }
        h2 { text-align: center; margin-top: 0; }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        input[type="password"] { background: #333; color: #fff; border: 1px solid #555; }
        input[type="file"] { background: #333; color: #fff; padding: 12px; border: 1px dashed #777; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:disabled { background: #555; color: #999; }
        
        #preview { max-width: 100%; border-radius: 8px; margin-top: 10px; display: none; }
        
        #resultContainer { margin-top: 20px; display: none; }
        
        /* 讓表格在手機上可以左右滑動，不會擠爛 */
        .table-responsive { width: 100%; overflow-x: auto; margin-bottom: 15px; border-radius: 8px; border: 1px solid #555; }
        table { width: 100%; border-collapse: collapse; background: #2d2d2d; font-size: 14px; min-width: 500px; }
        th, td { border: 1px solid #555; padding: 10px 8px; text-align: left; }
        th { background: #444; color: #66b3ff; white-space: nowrap; }
        td:nth-child(4) { text-align: right; color: #ffdd66; font-weight: bold; } /* 日幣特別標色 */
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-btns button { margin: 0; padding: 12px; font-size: 15px; }
        .btn-copy { background: #28a745; }
        .btn-share { background: #17a2b8; grid-column: span 2; }
        
        .checkbox-group { display: flex; align-items: center; font-size: 14px; color: #ccc; margin-bottom: 15px; }
        .checkbox-group input { width: auto; margin-right: 10px; transform: scale(1.3); }
        #statusText { color: #aaa; font-size: 14px; text-align: center; margin-top: 10px; white-space: pre-wrap;}
    </style>
</head>
<body>
    <h2>發票解析工具</h2>
    
    <input type="password" id="apiKey" placeholder="貼上 Gemini API Key">
    <div class="checkbox-group">
        <input type="checkbox" id="saveKey"> <label for="saveKey">記住金鑰</label>
    </div>

    <input type="file" id="imageInput" accept="image/*">
    <img id="preview" alt="發票預覽">

    <button id="submitBtn">送出解析</button>
    <div id="statusText"></div>

    <div id="resultContainer">
        <div class="table-responsive">
            <table id="resultTable">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>項目(原文)</th>
                        <th>中文翻譯(對帳用)</th>
                        <th>日幣</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        
        <div class="action-btns">
            <button id="copyDetailsBtn" class="btn-copy">📋 複製明細</button>
            <button id="copyTotalBtn" class="btn-copy">📋 複製加總</button>
            <button id="shareBtn" class="btn-share">📤 系統分享 / 複製全部</button>
        </div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const saveKeyCheck = document.getElementById('saveKey');
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const submitBtn = document.getElementById('submitBtn');
        const statusText = document.getElementById('statusText');
        const resultContainer = document.getElementById('resultContainer');
        const tableBody = document.getElementById('tableBody');
        
        const copyDetailsBtn = document.getElementById('copyDetailsBtn');
        const copyTotalBtn = document.getElementById('copyTotalBtn');
        const shareBtn = document.getElementById('shareBtn');
        
        let base64Image = "";
        let detailsTsv = "";    // 只存 3 欄
        let totalTsv = "";      // 只存 3 欄
        let fullShareText = ""; // 存所有內容含翻譯

        if (localStorage.getItem('saved_gemini_key')) {
            apiKeyInput.value = localStorage.getItem('saved_gemini_key');
            saveKeyCheck.checked = true;
        }

        saveKeyCheck.addEventListener('change', () => {
            if (!saveKeyCheck.checked) localStorage.removeItem('saved_gemini_key');
        });

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                preview.src = event.target.result;
                preview.style.display = 'block';
                base64Image = event.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        });

        submitBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) return alert("API Key 沒填。");
            if (!base64Image) return alert("照片沒傳。");

            if (saveKeyCheck.checked) localStorage.setItem('saved_gemini_key', apiKey);

            submitBtn.disabled = true;
            resultContainer.style.display = 'none';
            statusText.innerText = "玩命解析中，請稍候...";

            const prompt = `請解析這張發票。
            請嚴格輸出純 JSON 陣列格式，不要加上 \`\`\`json 標籤，也不要說任何其他廢話。
            規則如下：
            1. 每一筆品項轉成一個 JSON 物件：{"date": "MM/DD", "item": "店名 - 日文原文", "translation": "中文翻譯", "price": 數字}。
            2. 最後一筆必須是加總物件：{"date": "", "item": "店名 (總計)", "translation": "", "price": 總金額數字}。
            例如：
            [
              {"date": "08/13", "item": "駿河屋 - 誕生日なうさぎBIGぬいぐるみ", "translation": "生日兔子 BIG 絨毛娃娃", "price": 600},
              {"date": "", "item": "駿河屋 (總計)", "translation": "", "price": 3000}
            ]`;
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                            ]
                        }]
                    })
                });

                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                
                let rawText = data.candidates[0].content.parts[0].text;
                rawText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
                
                const parsedData = JSON.parse(rawText);
                
                // 自動組合總計名稱與日期的邏輯
                if (parsedData.length > 1) {
                    const itemsData = parsedData.slice(0, -1);
                    const firstItem = itemsData[0];
                    const storeName = firstItem.item.includes(' - ') ? firstItem.item.split(' - ')[0].trim() : "未知名稱";
                    
                    const summaryNames = itemsData.slice(0, 3).map(r => {
                        const pureItemName = r.item.includes(' - ') ? r.item.split(' - ')[1].trim() : r.item.trim();
                        return pureItemName.substring(0, 3);
                    });
                    
                    const summarySuffix = itemsData.length > 3 ? "..." : "";
                    const totalRow = parsedData[parsedData.length - 1];
                    totalRow.date = firstItem.date;
                    totalRow.item = `${storeName}(${summaryNames.join(',')}${summarySuffix})`;
                }

                let html = '';
                detailsTsv = "";
                totalTsv = "";
                fullShareText = "發票解析明細：\n\n";

                parsedData.forEach((row, index) => {
                    // 表格顯示 4 欄 (讓你看爽的)
                    html += `<tr><td>${row.date}</td><td>${row.item}</td><td>${row.translation}</td><td>${row.price}</td></tr>`;
                    
                    // 複製按鈕專用的 TSV，只抽 3 欄 (無視 translation)
                    if (index === parsedData.length - 1) {
                        totalTsv = `${row.date}\t${row.item}\t${row.price}`;
                    } else {
                        if (detailsTsv !== "") detailsTsv += "\n";
                        detailsTsv += `${row.date}\t${row.item}\t${row.price}`;
                    }
                });

                // 分享用的文字，包含翻譯
                fullShareText += parsedData.map(r => {
                    if (r.translation) {
                        return `${r.date || '    '} | ${r.item} | ${r.translation} | ¥${r.price}`;
                    } else {
                        return `${r.date || '    '} | ${r.item} | ¥${r.price}`;
                    }
                }).join('\n');

                tableBody.innerHTML = html;
                resultContainer.style.display = 'block';
                statusText.innerText = "解析完成！請對帳。";

            } catch (err) {
                statusText.innerText = "出錯了，可能是 AI 沒按格式回傳：\n" + err.message;
            } finally {
                submitBtn.disabled = false;
            }
        });

        function handleCopy(textToCopy, btnElement, successMsg) {
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = btnElement.innerText;
                const originalBg = btnElement.style.background;
                btnElement.innerText = successMsg;
                btnElement.style.background = "#1e7e34";
                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.style.background = originalBg;
                }, 2000);
            }).catch(() => alert("複製失敗，請檢查瀏覽器權限。"));
        }

        // 這裡綁定的變數是 detailsTsv 跟 totalTsv，裡面只有 3 欄
        copyDetailsBtn.addEventListener('click', () => handleCopy(detailsTsv, copyDetailsBtn, "✅ 明細已複製 (純3欄)"));
        copyTotalBtn.addEventListener('click', () => handleCopy(totalTsv, copyTotalBtn, "✅ 加總已複製 (純3欄)"));

        shareBtn.addEventListener('click', async () => {
            const shareData = {
                title: '發票解析結果',
                text: fullShareText
            };
            
            if (navigator.share && navigator.canShare(shareData)) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    console.log('分享取消:', err);
                }
            } else {
                handleCopy(fullShareText, shareBtn, "✅ 已複製含翻譯完整文字");
            }
        });
    </script>
</body>
</html>
